{% extends "base.html" %}



{% block head %}
<style>
    .container{
        max-width: 450px;
        margin: 60px auto;
        padding: 35px;
        background: white;
        border-radius: 15px;
        box-shadow: 0 8px 20px rgba(0,0,0,0.08);
        
    }
    .form-control{
        border-radius: 20px;
        border-color: black;
        text-align: center;
        padding: 5px;
        display: list-item;
    }
    .but{
        margin: 10px;
        border-width: 2px;
        padding: 12px 22px;
        border: 1px solid black;
        border-radius: 980px;
    }
    ul{
        display: flex;
        list-style:none;
        gap:3px
    }
    a:hover{
        color:rgb(8, 145, 236);
    }
</style>
{% endblock %}


{% block content %}

<div class="container">
    <h1>Company Registration</h1>

    <form action="/company_registration" method="POST">
    <div class="mb-3">
        <label > Company name</label>
        <input type="text" name="name" class="form-control" required>
    </div>
    <div class="mb-3">
        <label > Username</label>
        <input type="text" name="username" class="form-control" required>
    </div>
    <div class="mb-3">
        <label >Email</label>
        <input type="email" name="email" class="form-control" required>
    </div>
    <div class="mb-3">
        <label> Password</label>
        <input type="password" name="password" class="form-control" required>
    </div>
    <div class="mb-3">
        <label>Hr Name</label>
        <input type="text" name="hr_name" class="form-control" required>
    </div>
    <div class="mb-3">
        <label>Hr Contact</label>
        <input type="number" name="hr_contact" class="form-control" required>
    </div>
    <div class="mb-3">
        <label>Webiste</label>
        <input type="url" name="website" class="form-control" required>
    </div>
    <div class="mb-3">
        <label>Location</label>
        <input type="text" name="location" class="form-control" required>
    </div>

    <button type="submit" class="but">Register</button>
</form>
<ul>
    <li><p>Do you have an account?</p></li>
    <li> <a href="/company_login">login</a></li>
</ul>
</div>



{% endblock %}
