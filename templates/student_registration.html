{% extends "base.html" %}

{% block head %}
<style>
    body {
        background: #f5f7fb;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    h1 {
        text-align: center;
        font-weight: 600;
        color: #222;
    }

    .container {
        max-width: 420px;
        margin: 30px auto;
        padding: 30px;
        background: #ffffff;
        border-radius: 16px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
    }

    form {
        display: flex;
        flex-direction: column;
        gap: 15px;
    }

    .mb-3 {
        display: flex;
        flex-direction: column;
        gap: 6px;
    }

    label {
        font-size: 14px;
        font-weight: 500;
        color: #333;
    }

    .form-control {
        padding: 10px 14px;
        border-radius: 20px;
        border: 1px solid #ccc;
        outline: none;
        transition: 0.2s ease;
        font-size: 14px;
    }

    .form-control:focus {
        border-color: #000000;
        box-shadow: 0 0 0 2px rgba(22, 24, 26, 0.15);
    }

    /* File Upload */
    .custom-file-upload {
        display: inline-block;
        text-align: center;
        padding: 10px;
        border-radius: 20px;
        border: 1px dashed #aaa;
        cursor: pointer;
        transition: 0.2s;
        font-size: 14px;
    }

    .custom-file-upload:hover {
        background: #000000;
        color: white;
    }

    #file-name {
        font-size: 12px;
        color: #666;
        margin-top: 5px;
    }

    /* Button */
    .but {
        margin-top: 10px;
        padding: 12px;
        border: 1px solid black;
        border-radius: 999px;
        background: transparent;
        color: black;
        font-size: 15px;
        font-weight: 500;
        cursor: pointer;
        transition: 0.2s;

    }

    .but:hover {
        background: #000000;
        color: white;
    }

    ul {
        display: flex;
        justify-content: center;
        gap: 5px;
        margin-top: 15px;
        padding: 0;
    }

    ul li {
        list-style: none;
        font-size: 14px;
    }

    a {
        text-decoration: none;
        color: #000000;
        font-weight: 500;
    }

    a:hover {
        text-decoration: underline;
    }
</style>
{% endblock %}

{% block content %}

<h1>Student Registration</h1>

<div class="container">
    <form action="/student_registration" method="POST" enctype="multipart/form-data">
        
        <div class="mb-3">
            <label>Username</label>
            <input type="text" name="username" class="form-control" required>
        </div>

        <div class="mb-3">
            <label>Name</label>
            <input type="text" name="name" class="form-control" required>
        </div>

        <div class="mb-3">
            <label>Email</label>
            <input type="email" name="email" class="form-control" required>
        </div>

        <div class="mb-3">
            <label>Password</label>
            <input type="password" name="password" class="form-control" required>
        </div>

        <div class="mb-3">
            <label>Contact</label>
            <input type="tel" name="contact" class="form-control" required>
        </div>

        <div class="mb-3">
            <label>Department</label>
            <input type="text" name="department" class="form-control" required>
        </div>

        <div class="mb-3">
            <label>CGPA</label>
            <input type="number" step="0.01" name="cgpa" class="form-control" required>
        </div>

        <div class="mb-3">
            <label>Resume</label>

            <input type="file" id="resume" name="resume" accept=".pdf,.doc,.docx" required hidden>

            <label for="resume" class="custom-file-upload">
                Upload Resume
            </label>

            <div id="file-name"></div>
        </div>

        <button type="submit" class="but">Register</button>
    </form>

    <ul>
        <li>Do you have an account?</li>
        <li><a href="/student_login">Login</a></li>
    </ul>
</div>


{% endblock %}
